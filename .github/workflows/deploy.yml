name: Deploy index.html to Root

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy index.html to root
        run: cp Website/wwwroot/index.html index.html

      - name: Commit and Push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git reset --hard origin/master
          cp Website/wwwroot/index.html index.html
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update index.html from wwwroot"
          git push origin master
